<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>رحلة في عالم الذكاء الاصطناعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Lalezar&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15233b;
  --ink-soft:#3a4d6e;
  --paper:#fbf7ef;
  --paper-edge:#f1e9d8;
  --cream:#fff;
  --teal:#0e8c8b;
  --teal-deep:#0a6b6a;
  --coral:#ff6b5e;
  --amber:#ffb22e;
  --violet:#6c5ce7;
  --grass:#37b86b;
  --sky:#2d9cdb;
  --gold:#e0a93c;
  --line:#e6dcc6;
  --shadow:rgba(20,35,59,.16);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overscroll-behavior:none;-webkit-text-size-adjust:100%}
body{
  font-family:'Cairo',sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 20% 18%, rgba(108,92,231,.18), transparent 42%),
    radial-gradient(circle at 82% 78%, rgba(14,140,139,.20), transparent 46%),
    radial-gradient(circle at 60% 30%, rgba(255,178,46,.12), transparent 40%),
    linear-gradient(160deg,#101a30,#1a2a4a 55%,#101a30);
  min-height:100vh;
  min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 12px;
  overflow:hidden;
}
/* subtle circuit texture overlay */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
  background-image:
    linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px);
  background-size:46px 46px;
}

/* ---------- BOOK SHELL ---------- */
.book{
  position:relative;
  width:min(960px,100%);
  height:min(86vh,720px);
  height:min(86dvh,720px);
  perspective:2200px;
}
.page{
  position:absolute;inset:0;
  background:
    linear-gradient(90deg,var(--paper-edge),var(--paper) 5%,var(--paper) 95%,var(--paper-edge));
  border-radius:14px;
  box-shadow:0 30px 70px -18px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
  padding:34px clamp(26px,5vw,64px) 96px;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  display:none;
  animation:flip .55s cubic-bezier(.22,.61,.36,1);
  scrollbar-width:thin;scrollbar-color:var(--teal) transparent;
}
.page::-webkit-scrollbar{width:9px}
.page::-webkit-scrollbar-thumb{background:var(--teal);border-radius:9px;border:2px solid var(--paper)}
.page.active{display:block}
@keyframes flip{
  from{opacity:0;transform:rotateY(-14deg) translateX(26px);}
  to{opacity:1;transform:rotateY(0) translateX(0);}
}
/* binding line on the right (RTL) */
.page::after{
  content:"";position:absolute;top:0;bottom:0;right:0;width:26px;
  background:linear-gradient(270deg,rgba(20,35,59,.10),transparent);
  border-radius:0 14px 14px 0;pointer-events:none;
}

/* ---------- TYPOGRAPHY ---------- */
.page h1{font-family:'Lalezar',cursive;font-weight:400;font-size:clamp(1.9rem,5vw,3rem);line-height:1.18;color:var(--teal-deep);margin-bottom:.4em}
.page h2{font-family:'Lalezar',cursive;font-weight:400;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--ink);margin:.2em 0 .5em}
.page h3{font-size:1.18rem;font-weight:900;color:var(--teal-deep);margin:1.1em 0 .4em}
.page p{font-size:1.05rem;line-height:1.95;margin-bottom:.85em;color:var(--ink-soft)}
.page strong{color:var(--ink);font-weight:700}
.lead{font-size:1.12rem;color:var(--ink)}
.eyebrow{display:inline-block;font-weight:700;font-size:.82rem;letter-spacing:.5px;
  color:#fff;background:var(--teal);padding:5px 14px;border-radius:999px;margin-bottom:14px}

/* ---------- TABLES ---------- */
table{width:100%;border-collapse:separate;border-spacing:0;margin:14px 0 18px;font-size:.98rem;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px -10px var(--shadow)}
th{background:var(--teal);color:#fff;font-weight:700;padding:11px 12px;text-align:right}
td{padding:11px 12px;border-bottom:1px solid var(--line);background:var(--cream);color:var(--ink-soft);vertical-align:top;line-height:1.7}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:#fffdf8}

/* ---------- CALLOUT BOXES ---------- */
.box{border-radius:14px;padding:16px 18px 16px 18px;margin:16px 0;position:relative;border-right:6px solid;font-size:1rem;line-height:1.85}
.box .tag{font-weight:900;display:block;margin-bottom:6px;font-size:1.05rem}
.box.know{background:#eafaf5;border-color:var(--teal);color:#0a5a59}
.box.warn{background:#fff1ec;border-color:var(--coral);color:#a83b2e}
.box.myth{background:#f3f0ff;border-color:var(--violet);color:#4b3fb0}
.box.now{background:#fff8e9;border-color:var(--amber);color:#9a6a12}
.box.tip{background:#eef7ff;border-color:var(--sky);color:#1e6aa8}
.box ul{margin:6px 18px 0 0;line-height:1.9}
.box li{margin-bottom:4px}

blockquote{background:linear-gradient(120deg,#0e8c8b,#0a6b6a);color:#fff;border-radius:14px;
  padding:18px 22px;margin:16px 0;font-size:1.08rem;line-height:1.85;font-weight:600;
  box-shadow:0 10px 26px -12px rgba(14,140,139,.7)}
blockquote strong{color:#ffe6a3}

ul.bullets{margin:6px 20px 14px 0;line-height:2}
ul.bullets li{margin-bottom:6px;color:var(--ink-soft)}
ol{margin:6px 22px 14px 0;line-height:2}
ol li{margin-bottom:6px;color:var(--ink-soft)}

.section-block{margin:14px 0;padding:14px 16px;background:var(--cream);border-radius:12px;border:1px solid var(--line)}
.section-block .icon-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.section-block .icon-h .em{font-size:1.5rem}
.section-block .icon-h h3{margin:0}

/* tool card accent */
.toolcard{border-radius:16px;padding:18px 20px;margin:14px 0;background:var(--cream);
  border:1px solid var(--line);box-shadow:0 8px 22px -14px var(--shadow);position:relative;overflow:hidden}
.toolcard::before{content:"";position:absolute;top:0;right:0;width:8px;height:100%}
.toolcard.c-green::before{background:var(--grass)}
.toolcard.c-blue::before{background:var(--sky)}
.toolcard.c-violet::before{background:var(--violet)}
.toolcard.c-amber::before{background:var(--amber)}
.toolcard.c-coral::before{background:var(--coral)}
.toolcard.c-gold::before{background:var(--gold)}
.toolcard h2{display:flex;align-items:center;gap:12px;font-size:1.5rem;margin-bottom:8px}
.toolcard .dot{width:30px;height:30px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:900;flex-shrink:0;font-family:'Cairo'}
.toolcard p{margin-bottom:.5em}
.toolcard .field{font-weight:900;color:var(--teal-deep)}

/* ---------- COVER ---------- */
.cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;height:100%;
  background:radial-gradient(circle at 50% 30%,#0e8c8b,#0a4f55 70%,#073b40);border-radius:14px;color:#fff;padding:30px}
.cover .ttl{font-family:'Lalezar';font-size:clamp(2.4rem,8vw,4.4rem);line-height:1.05;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.18);margin:10px 0}
.cover .sub{font-size:clamp(1rem,3vw,1.3rem);color:#ffe6a3;font-weight:600;max-width:30ch;margin-bottom:18px}
.cover .agechip{background:#ffb22e;color:#5a3c00;font-weight:900;padding:8px 22px;border-radius:999px;font-size:1.1rem;margin-top:8px}
.cover .badge2{margin-top:16px;font-size:.9rem;color:#cfeeec;letter-spacing:.5px}

/* center utility */
.center{text-align:center}
.dedication{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;flex-direction:column}
.dedication p{font-size:1.3rem;line-height:2.1;max-width:34ch;color:var(--ink)}

/* certificate */
.certificate{border:4px double var(--gold);border-radius:18px;padding:30px;text-align:center;background:
  radial-gradient(circle at 50% 0,#fff8e9,#fff);box-shadow:0 10px 30px -16px var(--shadow);margin:10px 0}
.certificate .seal{font-size:3rem}
.certificate .line{display:inline-block;border-bottom:2px dashed var(--ink-soft);min-width:240px;margin:8px 0}
.certificate .award{font-family:'Lalezar';font-size:1.6rem;color:var(--gold);margin:14px 0}

/* contents page list */
.toc{list-style:none;margin:0}
.toc li{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;
  display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:.18s;box-shadow:0 4px 12px -10px var(--shadow)}
.toc li:hover{transform:translateX(-5px);border-color:var(--teal);box-shadow:0 8px 18px -10px var(--shadow)}
.toc .n{background:var(--teal);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.toc .t{font-weight:700;color:var(--ink)}
.toc .d{font-size:.92rem;color:var(--ink-soft);display:block;margin-top:2px;font-weight:400}

/* unit hero opener */
.unit-hero{text-align:center;padding:18px 0 6px}
.unit-hero .ucount{font-family:'Lalezar';font-size:5rem;color:var(--amber);line-height:1;text-shadow:0 4px 0 rgba(224,169,60,.25)}
.unit-hero .robot{font-size:3.4rem;margin-bottom:6px}

/* divider */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--teal)}
.divider::before,.divider::after{content:"";flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--line),transparent)}

/* ---------- NAV CONTROLS ---------- */
.controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:50;
  display:flex;align-items:center;gap:10px;background:rgba(16,26,48,.92);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  padding:6px 12px;border-radius:999px;box-shadow:0 10px 30px -8px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08)}
.nav-btn{background:var(--teal);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.18s;font-family:'Cairo'}
.nav-btn:hover:not(:disabled){background:var(--coral);transform:scale(1.08)}
.nav-btn:disabled{opacity:.32;cursor:not-allowed}
.counter{color:#fff;font-weight:700;font-size:.88rem;min-width:78px;text-align:center}
.counter .cur{color:var(--amber);font-size:1.05rem}

.menu-btn{position:fixed;top:16px;right:16px;z-index:50;background:var(--amber);color:#5a3c00;border:none;
  padding:10px 18px;border-radius:999px;font-family:'Cairo';font-weight:900;font-size:.95rem;cursor:pointer;
  box-shadow:0 8px 20px -8px rgba(0,0,0,.5);transition:.18s}
.menu-btn:hover{transform:translateY(-2px)}

.progress-track{position:fixed;top:0;left:0;right:0;height:5px;background:rgba(255,255,255,.08);z-index:60}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--coral),var(--teal));width:0;transition:width .4s}

.hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#cfeeec;font-size:.8rem;z-index:40;opacity:.7}

@media(max-width:640px){
  .page{padding:26px 20px 84px}
  .page p{font-size:1rem;line-height:1.8}
  .controls{bottom:12px}
  .hint{display:none}
  table{font-size:.86rem}
  th,td{padding:8px 8px}
}
</style>
</head>
<body>
<div class="progress-track"><div class="progress-fill" id="prog"></div></div>
<button class="menu-btn" id="menuBtn">📖 الفهرس</button>

<div class="book" id="book"><!-- PAGES INJECTED HERE --></div>

<div class="hint">استخدم الأسهم ← → أو الأزرار للتنقل بين الصفحات</div>
<div class="controls">
  <button class="nav-btn" id="next" title="التالي">›</button>
  <span class="counter" dir="ltr"><span class="cur" id="cur">1</span> / <span id="total">1</span></span>
  <button class="nav-btn" id="prev" title="السابق">‹</button>
</div>

<script id="book-script">
// ============================================================
//  بيانات صفحات الكتاب — كل عنصر = صفحة واحدة (HTML)
// ============================================================
const PAGES = [];

/* ---------- 1. الغلاف ---------- */
PAGES.push(`
<div class="cover">
  <div style="font-size:3.6rem">🤖✨</div>
  <div class="ttl">رحلة في عالم<br>الذكاء الاصطناعي</div>
  <div class="sub">كيف تَفهم الآلة، وتُبدِع معها، وتبقى أنت القائد</div>
  <div class="agechip">للأعمار 9 – 16 سنة</div>
  <div class="badge2">📘 كتاب تفاعلي • 7 وحدات • مشاريع وتحديات حقيقية</div>
  <div style="margin-top:20px;color:#ffe6a3;font-weight:600">يرافقك في الرحلة: <b style="color:#fff">ذَكي</b> 🤖</div>
  <div style="margin-top:26px;padding-top:16px;border-top:1px solid rgba(255,255,255,.25);color:#ffd86b;font-weight:900;font-size:1.18rem">إعداد وتصميم: نادية الحبسية</div>
  <div style="color:#ffffff;font-size:1.02rem;font-weight:700;margin-top:5px;text-shadow:0 1px 3px rgba(0,0,0,.35)">مدرّبة ذكاء اصطناعي</div>
</div>`);

/* ---------- 2. الإهداء ---------- */
PAGES.push(`
<div class="dedication">
  <div style="font-size:2.6rem;margin-bottom:14px">💫</div>
  <h2 style="color:var(--teal-deep)">إهداء</h2>
  <p>إلى كل فتاة وفتى يسألان «كيف يعمل هذا؟»<br>بدلاً من أن يكتفيا بالاندهاش…</p>
  <p style="color:var(--teal-deep);font-weight:700">هذا الكتاب لكم.<br>أنتم جيلٌ لن يستخدم الذكاء الاصطناعي فقط،<br>بل ستصنعون به مستقبلكم.</p>
</div>`);

/* ---------- 3. كلمة قبل أن نبدأ ---------- */
PAGES.push(`
<span class="eyebrow">قبل أن نبدأ</span>
<h1>مرحباً! أنا ذَكي 🤖</h1>
<p class="lead">روبوت صغير… لكنني لستُ كائناً حياً — أنا برنامجٌ صنعه البشر. سأرافقك في كل صفحة من هذه الرحلة.</p>
<p>قبل أن نغوص في المغامرة، أريدك أن تعرف ثلاثة أشياء مهمة:</p>
<div class="box know"><span class="tag">١. هذا الكتاب ليس امتحاناً</span>إنه مغامرة! ستجرّب، وستخطئ، وستكتشف — وهذا هو التعلّم الحقيقي.</div>
<div class="box myth"><span class="tag">٢. الذكاء الاصطناعي ليس سحراً ولا كائناً حياً</span>إنه أداة قوية صنعها البشر من <strong>الرياضيات</strong> و<strong>الأمثلة</strong>. وأنت من يقودها، لا العكس.</div>
<div class="box now"><span class="tag">٣. أنت لستَ متفرّجاً</span>في نهاية كل وحدة سيكون لديك <strong>تحدٍّ</strong> و<strong>مشروع</strong> تصنعه بيديك.</div>
<p class="center" style="font-size:1.2rem;color:var(--coral);font-weight:900;margin-top:18px">هل أنت مستعد؟ اقلب الصفحة، ولنبدأ! 🚀</p>`);

/* ---------- 4. كيف تستخدم الكتاب ---------- */
PAGES.push(`
<span class="eyebrow">دليلك السريع</span>
<h1>كيف تستخدم هذا الكتاب؟</h1>
<p>كل وحدة مبنية بالطريقة نفسها، لتعرف دائماً أين أنت في الرحلة:</p>
<div class="section-block"><div class="icon-h"><span class="em">🎯</span><h3>الهدف</h3></div><p style="margin:0">ماذا ستتعلم في هذه الوحدة؟</p></div>
<div class="section-block"><div class="icon-h"><span class="em">💡</span><h3>الشرح المبسّط</h3></div><p style="margin:0">الفكرة بكلمات وصور سهلة.</p></div>
<div class="section-block"><div class="icon-h"><span class="em">🎮</span><h3>نشاط تفاعلي</h3></div><p style="margin:0">جرّب بنفسك الآن!</p></div>
<div class="section-block"><div class="icon-h"><span class="em">🛠️</span><h3>تطبيق عملي</h3></div><p style="margin:0">استخدم ما تعلمته في حياتك.</p></div>
<div class="section-block"><div class="icon-h"><span class="em">🤔</span><h3>سؤال يجعلك تفكّر</h3></div><p style="margin:0">لا توجد إجابة واحدة صحيحة!</p></div>
<div class="section-block"><div class="icon-h"><span class="em">🏆</span><h3>التحدي / المشروع</h3></div><p style="margin:0">أنجِز شيئاً تفخر به.</p></div>
<div class="divider">وفي الزوايا ستجد صناديق ملوّنة</div>
<div class="box know" style="margin:8px 0"><span class="tag">📌 هل تعلم؟</span>معلومة مدهشة.</div>
<div class="box warn" style="margin:8px 0"><span class="tag">⚠️ انتبه!</span>قاعدة أمان أو أخلاق مهمة.</div>
<div class="box myth" style="margin:8px 0"><span class="tag">🔁 خرافة أم حقيقة؟</span>نكشف الأفكار الخاطئة الشائعة.</div>
<div class="box now" style="margin:8px 0"><span class="tag">✅ الآن أنت تعرف</span>خلاصة سريعة في نهاية كل قسم.</div>`);

/* ---------- 5. الفهرس ---------- */
PAGES.push(`
<span class="eyebrow">خريطة الرحلة</span>
<h1>فهرس المحتويات</h1>
<ul class="toc" id="tocList">
  <li data-go="5"><span class="n">1</span><span><span class="t">ما هو الذكاء الاصطناعي؟</span><span class="d">اكتشف الفكرة الكبرى، وكيف «يتعلّم» الحاسوب.</span></span></li>
  <li data-go="12"><span class="n">2</span><span><span class="t">أنواع الذكاء الاصطناعي</span><span class="d">من المساعد الصوتي إلى خيال الأفلام، وأين نحن اليوم.</span></span></li>
  <li data-go="19"><span class="n">3</span><span><span class="t">الذكاء الاصطناعي التوليدي</span><span class="d">الآلة التي تكتب وترسم وتُغنّي وتصنع الفيديو.</span></span></li>
  <li data-go="26"><span class="n">4</span><span><span class="t">هندسة الأوامر</span><span class="d">سرّ التحدث مع الآلة لتحصل على أفضل النتائج.</span></span></li>
  <li data-go="33"><span class="n">5</span><span><span class="t">البحث الذكي والتحقق من المصادر</span><span class="d">كن محقّقاً رقمياً لا تخدعه الصور المزيفة.</span></span></li>
  <li data-go="40"><span class="n">6</span><span><span class="t">أخلاقيات الذكاء الاصطناعي وأمانك الرقمي</span><span class="d">القوة الكبيرة تحتاج مسؤولية كبيرة.</span></span></li>
  <li data-go="47"><span class="n">7</span><span><span class="t">صندوق أدواتك الذكية</span><span class="d">دليلك العملي لأهم الأدوات في دراستك وحياتك.</span></span></li>
</ul>
<p class="center" style="color:var(--ink-soft);font-size:.92rem">💡 اضغط على أي وحدة للانتقال إليها مباشرة!</p>`);


/* ============ الوحدة 1: ما هو الذكاء الاصطناعي؟ ============ */

/* 6. مفتتح الوحدة 1 */
PAGES.push(`
<div class="unit-hero">
  <div class="robot">🤖</div>
  <div class="ucount">1</div>
  <span class="eyebrow">الوحدة الأولى</span>
  <h1>ما هو الذكاء الاصطناعي؟</h1>
</div>
<div class="box now" style="border-color:var(--teal);background:#eafaf5;color:#0a5a59">
  <span class="tag">🎯 الهدف</span>
  ستفهم ما هو الذكاء الاصطناعي حقاً، وكيف يختلف عن البرنامج العادي، وكيف «يتعلّم» الحاسوب من الأمثلة.
</div>`);

/* ============================================================
   منطق التنقّل
   ============================================================ */
(function(){
  const book = document.getElementById('book');
  PAGES.forEach((html,i)=>{
    const d = document.createElement('div');
    d.className = 'page' + (i===0?' active':'');
    d.innerHTML = html;
    book.appendChild(d);
  });
  const pages = [...document.querySelectorAll('.page')];
  let cur = 0;
  const total = pages.length;
  document.getElementById('total').textContent = total;
  const prevBtn = document.getElementById('prev');   // ‹ يذهب للسابق (RTL)
  const nextBtn = document.getElementById('next');   // › يذهب للتالي
  const curEl = document.getElementById('cur');
  const prog = document.getElementById('prog');

  function show(n){
    if(n<0||n>=total) return;
    pages[cur].classList.remove('active');
    cur = n;
    pages[cur].classList.add('active');
    pages[cur].scrollTop = 0;
    curEl.textContent = cur+1;
    prog.style.width = ((cur+1)/total*100)+'%';
    prevBtn.disabled = (cur===0);
    nextBtn.disabled = (cur===total-1);
  }
  nextBtn.onclick = ()=>show(cur+1);
  prevBtn.onclick = ()=>show(cur-1);

  // arrow keys: in RTL, Right arrow = previous, Left arrow = next
  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft')  show(cur+1);
    if(e.key==='ArrowRight') show(cur-1);
  });

  // table of contents click (delegated)
  document.addEventListener('click',e=>{
    const li = e.target.closest('[data-go]');
    if(li){ show(parseInt(li.dataset.go,10)); }
  });

  // menu button -> go to contents page (index 4)
  document.getElementById('menuBtn').onclick = ()=>show(4);

  show(0);
})();



</script>
